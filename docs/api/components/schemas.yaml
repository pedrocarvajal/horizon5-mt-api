SuccessEnvelope:
  type: object
  required: [success]
  properties:
    success:
      type: boolean
      const: true
    message:
      type: string
    data: {}
    meta:
      type: object

TokenPairResponse:
  type: object
  required: [success, data]
  properties:
    success:
      type: boolean
      const: true
    data:
      type: object
      required: [access, refresh, expires_at]
      properties:
        access:
          type: string
          description: Short-lived JWT access token.
        refresh:
          type: string
          description: Long-lived JWT refresh token.
        expires_at:
          type: integer
          description: Unix timestamp (seconds) when the access token expires.

RefreshRequest:
  type: object
  required: [refresh]
  properties:
    refresh:
      type: string
      minLength: 1
      description: The refresh token to exchange.

LogoutRequest:
  type: object
  required: [refresh]
  properties:
    refresh:
      type: string
      minLength: 1
      description: The refresh token to blacklist.

UserProfile:
  type: object
  required: [success, data]
  properties:
    success:
      type: boolean
      const: true
    data:
      type: object
      required: [id, email, role, created_at]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
          enum: [root, platform, producer]
        created_at:
          type: string
          format: date-time

LoginWithCredentials:
  type: object
  required: [email, password]
  properties:
    email:
      type: string
      format: email
      minLength: 5
      maxLength: 254
      default: "root@mail.co"
    password:
      type: string
      format: password
      minLength: 8
      maxLength: 128
      default: "123456789*"

LoginWithApiKey:
  type: object
  required: [api_key]
  properties:
    api_key:
      type: string
      minLength: 1
      maxLength: 256
      description: Plaintext API key.

CreateApiKeyRequest:
  type: object
  required: [name]
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 100
      description: Human-readable label for the API key.
    allowed_ips:
      type: array
      items:
        type: string
        format: ipv4
      maxItems: 20
      default: []
      description: IP whitelist. Empty array allows all IPs.
    expires_at:
      type: string
      format: date-time
      nullable: true
      description: Optional expiration date. Null means no expiration.

UpdateApiKeyRequest:
  type: object
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 100
    allowed_ips:
      type: array
      items:
        type: string
        format: ipv4
      maxItems: 20
    is_active:
      type: boolean
    expires_at:
      type: string
      format: date-time
      nullable: true

ApiKey:
  type: object
  properties:
    id:
      type: string
      format: uuid
    name:
      type: string
    prefix:
      type: string
      description: First 8 characters of the key for identification.
    allowed_ips:
      type: array
      items:
        type: string
    is_active:
      type: boolean
    is_expired:
      type: boolean
    expires_at:
      type: string
      format: date-time
      nullable: true
    last_used_at:
      type: string
      format: date-time
      nullable: true
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

PushEventRequest:
  type: object
  required: [key, payload]
  properties:
    key:
      $ref: "#/EventKeyEnum"
    payload:
      type: object
      description: Validated against the event key schema. Max 65536 bytes, max 5 nesting levels.

AckEventRequest:
  type: object
  properties:
    response:
      type: object
      nullable: true
      description: Optional response data. Max 65536 bytes, max 5 nesting levels.

Event:
  type: object
  properties:
    id:
      type: string
    consumer_id:
      type: string
      nullable: true
    account_id:
      type: string
    user_id:
      type: string
    key:
      $ref: "#/EventKeyEnum"
    payload:
      type: object
    response:
      type: object
      nullable: true
    status:
      $ref: "#/EventStatus"
    delivered_at:
      type: string
      format: date-time
      nullable: true
    processed_at:
      type: string
      format: date-time
      nullable: true
    attempts:
      type: integer
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

EventKeyEnum:
  type: string
  enum:
    - post.order
    - get.order
    - put.order
    - delete.order
    - get.account.info
    - get.klines
    - get.ticker
    - patch.account.disable
    - patch.account.enable

EventStatus:
  type: string
  enum: [pending, delivered, processed, failed]

AccountStatusEnum:
  type: string
  enum: [active, inactive]

UpdateAccountRequest:
  type: object
  properties:
    status:
      $ref: "#/AccountStatusEnum"
    broker:
      type: string
      maxLength: 255
    server:
      type: string
      maxLength: 255
    currency:
      type: string
      maxLength: 10
    leverage:
      type: integer
      minimum: 1
    balance:
      type: number
      format: decimal
    equity:
      type: number
      format: decimal
    margin:
      type: number
      format: decimal
    free_margin:
      type: number
      format: decimal
    profit:
      type: number
      format: decimal
    margin_level:
      type: number
      format: decimal

UpsertAccountRequest:
  type: object
  required: [account_id]
  properties:
    account_id:
      type: integer
    broker:
      type: string
      maxLength: 255
    server:
      type: string
      maxLength: 255
    currency:
      type: string
      maxLength: 10
    leverage:
      type: integer
      minimum: 1
    balance:
      type: number
      format: decimal
    equity:
      type: number
      format: decimal
    margin:
      type: number
      format: decimal
    free_margin:
      type: number
      format: decimal
    profit:
      type: number
      format: decimal
    margin_level:
      type: number
      format: decimal

UpsertStrategyRequest:
  type: object
  required: [id, account_id, symbol, prefix, name, magic_number, balance]
  properties:
    id:
      type: string
      format: uuid
    account_id:
      type: integer
    symbol:
      type: string
      maxLength: 50
    prefix:
      type: string
      maxLength: 50
    name:
      type: string
      maxLength: 255
    magic_number:
      type: integer
    balance:
      type: number
      format: decimal

CreateHeartbeatRequest:
  type: object
  required: [account_id, event, system]
  properties:
    account_id:
      type: integer
    strategy_id:
      type: string
      format: uuid
      nullable: true
    event:
      type: string
      enum: [on_init, on_running, on_deinit, on_error]
    system:
      type: string
      enum: [strategy, system]

UpsertOrderRequest:
  type: object
  required: [id, account_id, symbol, side, status, volume]
  properties:
    id:
      type: string
      format: uuid
    account_id:
      type: integer
    strategy_id:
      type: string
      format: uuid
      nullable: true
    deal_id:
      type: integer
      nullable: true
    position_id:
      type: integer
      nullable: true
    source:
      type: string
      maxLength: 50
    symbol:
      type: string
      maxLength: 50
    side:
      type: string
      maxLength: 10
    status:
      type: string
      enum: [pending, open, closing, closed, cancelled]
    is_market_order:
      type: boolean
      default: false
    volume:
      type: number
      format: decimal
    signal_price:
      type: number
      format: decimal
    open_at_price:
      type: number
      format: decimal
    open_price:
      type: number
      format: decimal
    close_price:
      type: number
      format: decimal
    take_profit:
      type: number
      format: decimal
    stop_loss:
      type: number
      format: decimal
    profit:
      type: number
      format: decimal
    gross_profit:
      type: number
      format: decimal
    commission:
      type: number
      format: decimal
    swap:
      type: number
      format: decimal
    close_reason:
      type: string
      enum: [tp, sl, expert, client, mobile, web, unknown]
    signal_at:
      type: string
      format: date-time
      nullable: true
    opened_at:
      type: string
      format: date-time
      nullable: true
    closed_at:
      type: string
      format: date-time
      nullable: true

CreateLogRequest:
  type: object
  required: [account_id, level, message]
  properties:
    account_id:
      type: integer
    strategy_id:
      type: string
      format: uuid
      nullable: true
    level:
      type: string
      maxLength: 20
    message:
      type: string
      maxLength: 5000

CreateAccountSnapshotRequest:
  type: object
  required: [account_id, balance, equity, profit, margin_level, open_positions, drawdown_pct, daily_pnl, floating_pnl, open_order_count, exposure_lots]
  properties:
    account_id:
      type: integer
    balance:
      type: number
      format: decimal
    equity:
      type: number
      format: decimal
    profit:
      type: number
      format: decimal
    margin_level:
      type: number
      format: decimal
    open_positions:
      type: integer
      minimum: 0
    drawdown_pct:
      type: number
      format: decimal
    daily_pnl:
      type: number
      format: decimal
    floating_pnl:
      type: number
      format: decimal
    open_order_count:
      type: integer
      minimum: 0
    exposure_lots:
      type: number
      format: decimal

CreateStrategySnapshotRequest:
  type: object
  required: [account_id, strategy_id, nav, drawdown_pct, daily_pnl, floating_pnl, open_order_count, exposure_lots]
  properties:
    account_id:
      type: integer
    strategy_id:
      type: string
      format: uuid
    nav:
      type: number
      format: decimal
    drawdown_pct:
      type: number
      format: decimal
    daily_pnl:
      type: number
      format: decimal
    floating_pnl:
      type: number
      format: decimal
    open_order_count:
      type: integer
      minimum: 0
    exposure_lots:
      type: number
      format: decimal

MediaFile:
  type: object
  required: [id, account_id, user_id, file_name, original_name, content_type, size, expires_at, created_at]
  properties:
    id:
      type: string
      format: uuid
    account_id:
      type: integer
    user_id:
      type: string
      format: uuid
    file_name:
      type: string
      description: Unique server-generated file name (UUID + extension).
    original_name:
      type: string
      description: Original file name provided during upload.
    content_type:
      type: string
      enum:
        - image/jpeg
        - image/png
        - image/gif
        - image/webp
        - application/pdf
        - text/csv
        - application/zip
    size:
      type: integer
      description: File size in bytes.
    expires_at:
      type: string
      format: date-time
      description: UTC timestamp after which the file can no longer be downloaded.
    created_at:
      type: string
      format: date-time
